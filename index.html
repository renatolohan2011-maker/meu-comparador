<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MultiBusca Ofertas - Super Filtros</title>
    <style>
        body { font-family: sans-serif; background-color: #121214; color: #ffffff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .search-container { text-align: center; background-color: #202024; padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 6px; border: none; box-sizing: border-box; font-size: 16px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; width: 100%; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; color: #fff; }
        .btn-amazon { background-color: #ff9900; color: #000; }
        .btn-shopee { background-color: #ee4d2d; }
        .btn-ml { background-color: #fff159; color: #333; }
        .btn-magalu { background-color: #0086ff; }
    </style>
</head>
<body>
<div class="search-container">
    <h1>MultiBusca Ofertas 🛒</h1>
    <p style="color: #00ff88; margin-top: -10px; margin-bottom: 20px; font-size: 14px; font-weight: bold;">🔥 Menor Preço + Frete Grátis + Sem Juros</p>
    <input type="text" id="produto" placeholder="Digite o produto...">
    <div class="btn-grid">
        <button class="btn-amazon" onclick="buscar('amazon')">Amazon</button>
        <button class="btn-shopee" onclick="buscar('shopee')">Shopee</button>
        <button class="btn-ml" onclick="buscar('mercadolivre')">Mercado Livre</button>
        <button class="btn-magalu" onclick="buscar('magalu')">Magalu</button>
    </div>
</div>
<script>
function buscar(loja) {
    const p = document.getElementById('produto').value;
    if (!p) { alert('Digite um produto primeiro!'); return; }
    
    if (loja === 'amazon') {
        // Filtra por Frete Grátis enviando para produtos elegíveis a entrega gratuita e menor preço
        window.open('https://www.amazon.com.br/s?k=' + p + '&rh=p_76%3A13861834011&s=price-asc-rank&tag=SEU_ID_AMAZON');
    } else if (loja === 'shopee') {
        // Ativa o filtro de Frete Grátis oficial da Shopee e menor preço
        window.open('https://shopee.com.br/search?keyword=' + p + '&freeShipping=true&sortBy=price&order=asc&smtt=SEU_ID_SHOPEE');
    } else if (loja === 'mercadolivre') {
        // Ativa os filtros combinados de Frete Grátis (shipping_cost_free) e Sem Juros (installments_no_interest) ordenado pelo menor preço
        window.open('https://lista.mercadolivre.com.br/' + p + '_DisplayType_G_Filter_shipping_cost_free_Filter_installments_no_interest_PriceOrder_Asc_NoIndex_True#D[A:' + p + ',af_c_id=SEU_ID_ML]');
    } else if (loja === 'magalu') {
        // Envia para a busca da Magalu com ordenação por menor preço
        window.open('https://www.magazineluiza.com.br/busca/' + p + '/?sort=price%3Aasc&seller_id=SEU_ID_MAGALU');
    }
}
</script>
</body>
</html>
