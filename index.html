<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MultiBusca Ofertas</title>
    <style>
        body { font-family: sans-serif; background-color: #121214; color: #ffffff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .search-container { text-align: center; background-color: #202024; padding: 40px; border-radius: 12px; width: 90%; max-width: 500px; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 6px; border: none; }
        button { padding: 12px; width: 45%; margin: 5px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div class="search-container">
    <h1>MultiBusca Ofertas 🛒</h1>
    <input type="text" id="produto" placeholder="Digite o produto...">
    <button onclick="buscar('amazon')">Amazon</button>
    <button onclick="buscar('shopee')">Shopee</button>
</div>
<script>
function buscar(loja) {
    const p = document.getElementById('produto').value;
    if (loja === 'amazon') window.open('https://www.amazon.com.br/s?k=' + p);
    else window.open('https://shopee.com.br/search?keyword=' + p);
}
</script>
</body>
</html>
